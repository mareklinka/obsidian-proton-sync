name: Release Obsidian plugin

on:
  push:
    branches:
      - release
      - beta

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Compute beta version
        if: startsWith(github.ref, 'refs/heads/beta')
        run: |
          # We need both local and remote tags to compute the next beta number reliably.
          git fetch --tags origin

          # Read current manifest version and normalize it to a stable base release version.
          # Example: 1.2.3-beta.4 -> 1.2.3
          base_version="$(node -p "const v=require('./manifest.json').version; v.replace(/-beta\.\d+$/, '')")"

          # Find highest existing beta suffix N from tags named: <base_version>-beta.N
          # Sources:
          #  - local tags from checkout
          #  - remote tags from origin
          # Notes on the pipeline:
          #  - first sed strips everything before refs/tags/
          #  - second sed (-n) prints ONLY lines that match the beta pattern and returns N
          #  - sort/tail picks the largest N
          latest_beta_number="$({
            git tag -l "${base_version}-beta.*"
            git ls-remote --tags origin "refs/tags/${base_version}-beta.*" | sed -E 's#^.*refs/tags/##'
          } | sed -nE "s/^${base_version//./\\.}-beta\\.([0-9]+)$/\\1/p" | sort -n | tail -n1)"

          # First beta for this base version starts at 1.
          if [ -z "$latest_beta_number" ]; then
            next_beta_number=1
          else
            next_beta_number=$((latest_beta_number + 1))
          fi

          # Compose final beta version and persist it into manifest.json for this workflow run.
          beta_version="${base_version}-beta.${next_beta_number}"
          echo "Computed beta version: $beta_version"

          node -e "const fs=require('fs'); const p='./manifest.json'; const m=JSON.parse(fs.readFileSync(p, 'utf8')); m.version='${beta_version}'; fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\\n');"

          # Expose for downstream steps/debugging.
          echo "beta_version=$beta_version" >> "$GITHUB_ENV"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Create and tag beta release
        if: startsWith(github.ref, 'refs/heads/beta')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag is exactly the computed manifest version (e.g. 1.2.3-beta.7).
          tag="$(node -p "require('./manifest.json').version")"

          git fetch --tags origin

          # Beta tags/releases are immutable: we fail instead of overwriting existing ones.
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag '$tag' already exists locally. Refusing to overwrite beta tag."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag '$tag' already exists on origin. Refusing to overwrite beta tag."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release '$tag' already exists. Refusing to overwrite beta release."
            exit 1
          fi

          git tag "$tag"
          git push origin "refs/tags/$tag"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css

      - name: Create and tag release
        if: startsWith(github.ref, 'refs/heads/release')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(node -p "require('./manifest.json').version")"

          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag '$tag' already exists locally. Refusing to overwrite release tag."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag '$tag' already exists on origin. Refusing to overwrite release tag."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release '$tag' already exists. Refusing to overwrite release."
            exit 1
          fi

          git tag "$tag"
          git push origin "refs/tags/$tag"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
